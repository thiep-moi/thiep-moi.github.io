<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Sưu Tập Thiệp Cưới Cao Cấp</title>

    <!-- Tích hợp hệ thống Font Chữ Quyền Lực -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        /* =========================================
           HỆ TỌA ĐỘ MÀU SẮC L'AURA BLEU (TRẠM LAM NGỌC)
           ========================================= */
        :root {
            --bg-ice-blue: #F0F4F8;
            /* Xanh lam sáng rực rỡ, lạnh và trong vắt */
            --text-navy: #1A2B3C;
            /* Xanh hải quân cực thẫm thay cho màu đen */
            --accent-blue: #8AB4F8;
            /* Xanh lam điểm xuyết */
            --card-glass: rgba(255, 255, 255, 0.85);
            /* Kính pha lê trắng */

            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            --font-script: 'Great Vibes', cursive;

            --ease-luxury: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-ice-blue);
            color: var(--text-navy);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            /* Phủ một lớp sương mù quang học cực nhẹ làm nền */
            background-image: radial-gradient(circle at 50% 0%, #FFFFFF 0%, transparent 70%);
        }

        /* =========================================
           SẢNH ĐÓN KHÁCH (HERO SECTION)
           ========================================= */
        .store-header {
            text-align: center;
            padding: 8rem 1.5rem 5rem 1.5rem;
            position: relative;
        }

        .brand-name {
            font-family: var(--font-script);
            font-size: clamp(4rem, 10vw, 6rem);
            color: var(--text-navy);
            line-height: 1;
            margin-bottom: 1rem;
            animation: fadeDown 1.5s var(--ease-luxury) forwards;
            opacity: 0;
            transform: translateY(-30px);
        }

        .brand-slogan {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text-navy);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.5s var(--ease-luxury) 0.3s forwards;
        }

        /* Vẽ đường gạch mảnh dưới Slogan */
        .brand-slogan::after {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background-color: var(--accent-blue);
            margin: 1.5rem auto 0 auto;
        }

        /* =========================================
           MA TRẬN TRƯNG BÀY (THE GALLERY GRID)
           ========================================= */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 8rem 2rem;
        }

        /* LƯỚI KHÔNG GIAN BẤT BẠI: 4 Cột trên PC */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2.5rem;
        }

        /* =========================================
           THẺ PHA LÊ (CRYSTAL CARDS)
           ========================================= */
        .template-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(26, 43, 60, 0.05);
            transition: transform 0.6s var(--ease-luxury), box-shadow 0.6s var(--ease-luxury);
            opacity: 0;
            transform: translateY(50px);
            animation: fadeUpCard 1.5s var(--ease-luxury) forwards;
        }

        /* Nhịp điệu xuất hiện so le */
        .template-card:nth-child(1) {
            animation-delay: 0.4s;
        }

        .template-card:nth-child(2) {
            animation-delay: 0.6s;
        }

        .template-card:nth-child(3) {
            animation-delay: 0.8s;
        }

        .template-card:nth-child(4) {
            animation-delay: 1.0s;
        }

        .template-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(138, 180, 248, 0.2);
            /* Ánh sáng xanh hắt ra khi hover */
        }

        /* Khung ảnh mockup */
        .card-image-wrap {
            width: 100%;
            aspect-ratio: 3/4;
            /* Tỷ lệ dọc chuẩn màn hình điện thoại */
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .card-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.5s var(--ease-luxury);
        }

        .template-card:hover .card-image-wrap img {
            transform: scale(1.08);
            /* Zoom nhẹ ảnh khi hover */
        }

        /* Thông tin mẫu thiệp */
        .card-info {
            flex-grow: 1;
            /* Ép phần nội dung đẩy nút bấm xuống đáy */
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .template-id {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .template-name {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-navy);
            margin-bottom: 1.5rem;
        }

        /* =========================================
           NÚT BẤM LUXURY CTA (CALL TO ACTION)
           ========================================= */
        .btn-view-demo {
            display: block;
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: 1px solid var(--text-navy);
            color: var(--text-navy);
            font-family: var(--font-sans);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.5s var(--ease-luxury);
            position: relative;
            overflow: hidden;
            z-index: 1;
            margin-top: auto;
            /* Đẩy nút xuống sát đáy thẻ */
        }

        /* Hiệu ứng trượt màu khi Hover nút */
        .btn-view-demo::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--text-navy);
            z-index: -1;
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.5s var(--ease-luxury);
        }

        .btn-view-demo:hover {
            color: #ffffff;
            border-color: var(--text-navy);
        }

        .btn-view-demo:hover::before {
            transform: scaleY(1);
        }

        /* =========================================
           THUẬT TOÁN ĐIỆN THOẠI (2 CỘT)
           ========================================= */
        @media (max-width: 992px) {

            /* Máy tính bảng: Chuyển về 2 cột */
            .collection-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }
        }

        @media (max-width: 600px) {

            /* Điện thoại: Vẫn giữ 2 cột, nhưng thu hẹp khoảng cách để tối ưu */
            .gallery-container {
                padding: 0 1rem 5rem 1rem;
            }

            .collection-grid {
                gap: 1rem;
            }

            .template-card {
                padding: 1rem;
                border-radius: 12px;
            }

            .template-name {
                font-size: 1.3rem;
                margin-bottom: 1rem;
            }

            .template-id {
                font-size: 0.6rem;
                letter-spacing: 2px;
            }

            .btn-view-demo {
                padding: 10px 0;
                font-size: 0.7rem;
                letter-spacing: 1px;
            }
        }

        /* Animation Keyframes */
        @keyframes fadeDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUpCard {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* =========================================
           HỆ THỐNG PHÂN TRANG TẠP CHÍ (PAGINATION)
           ========================================= */
        .pagination-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 5rem;
            opacity: 0;
            animation: fadeUp 1.5s var(--ease-luxury) 1.2s forwards;
        }

        .page-number {
            background: transparent;
            border: 1px solid transparent;
            /* Viền tàng hình */
            color: var(--text-navy);
            font-family: var(--font-serif);
            /* Dùng font Serif để tạo số 01, 02 quyền lực */
            font-size: 1.2rem;
            font-style: italic;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            /* Khối tròn hoàn hảo */
            cursor: pointer;
            transition: all 0.4s var(--ease-luxury);
        }

        /* Hiệu ứng khi rê chuột */
        .page-number:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        /* Nút đang được chọn (Active) */
        .page-number.active {
            background: var(--text-navy);
            color: #ffffff;
            border-color: var(--text-navy);
            font-style: normal;
            /* Đứng thẳng lên kiêu hãnh */
            box-shadow: 0 10px 20px rgba(26, 43, 60, 0.2);
        }

        /* =========================================
           MA TRẬN TRÌNH DIỄN KHÔNG CHẠM (IFRAME MODAL)
           ========================================= */
        .demo-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 999999;
            background: rgba(26, 43, 60, 0.85);
            /* Nền Xanh Hải Quân trong suốt che phủ toàn bộ */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s var(--ease-luxury), visibility 0.6s var(--ease-luxury);
        }

        /* Khi được kích hoạt, lồng kính sẽ hiện ra */
        .demo-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Giả lập màn hình điện thoại (Mobile Mockup) */
        .demo-iframe-wrapper {
            width: 95vw;
            height: 90vh;
            max-width: 430px;
            /* Khóa cứng tỷ lệ điện thoại cực đẹp */
            background: var(--bg-ice-blue);
            border-radius: 30px;
            /* Góc bo tròn như viền iPhone */
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.2);
            position: relative;
            transform: translateY(60px) scale(0.95);
            transition: transform 0.6s var(--ease-luxury) 0.1s;
        }

        .demo-modal-overlay.active .demo-iframe-wrapper {
            transform: translateY(0) scale(1);
            /* Lao lên mượt mà */
        }

        #demo-iframe {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* Chữ nhấp nháy trong lúc đợi mạng load thiệp */
        .demo-loader {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-serif);
            font-size: 1.2rem;
            color: var(--text-navy);
            font-style: italic;
            letter-spacing: 2px;
            animation: pulseLoader 1.5s infinite alternate ease-in-out;
        }

        @keyframes pulseLoader {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* Nút Tắt (X) khổng lồ, thanh lịch */
        .demo-close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 300;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.4s ease;
            z-index: 9999999;
        }

        .demo-close-btn:hover {
            transform: rotate(90deg) scale(1.1);
            /* Xoay nhẹ khi chạm vào */
        }

        @media (max-width: 600px) {
            .demo-iframe-wrapper {
                width: 100vw;
                height: 100dvh;
                max-width: none;
                border-radius: 0;
                /* Xóa viền giả lập trên điện thoại thật */
            }

            .demo-close-btn {
                top: 10px;
                right: 15px;
                background: rgba(0, 0, 0, 0.3);
                border-radius: 50%;
                width: 40px;
                height: 40px;
                font-size: 2rem;
                display: flex;
                align-items: center;
                justify-content: center;
                padding-bottom: 5px;
            }
        }
    </style>
</head>

<body>

    <header class="store-header">
        <h1 class="brand-name">Thiệp Cưới Online</h1>
        <div class="brand-slogan">Bộ Sưu Tập Thiệp Cưới Độc Bản</div>
    </header>

    <main class="gallery-container">
        <!-- Ma trận Lưới Grid (Tự động 4 cột PC, 2 cột Mobile) -->
        <div class="collection-grid">

            <!-- THẺ SỐ 01 -->
            <article class="template-card">
                <div class="card-image-wrap">
                    <!-- Ngài thay link ảnh mockup của ngài vào đây -->
                    <img src="anh_mockup_1.png" alt="Mẫu thiệp 1">
                </div>
                <div class="card-info">
                    <span class="template-id">No. 01</span>
                    <h2 class="template-name">Mẫu Nâu Đỏ</h2>
                    <!-- Ngài dán Link của mẫu thiệp 1 vào href dưới đây -->
                    <a href="https://thiepmoicuoionl.github.io/mau_01/" target="_blank" class="btn-view-demo">Xem
                        Mẫu</a>
                </div>
            </article>

            <!-- THẺ SỐ 02 -->
            <article class="template-card">
                <div class="card-image-wrap">
                    <img src="anh_mockup_2.png" alt="Mẫu thiệp 2">
                </div>
                <div class="card-info">
                    <span class="template-id">No. 02</span>
                    <h2 class="template-name">Mẫu Xanh Lam</h2>
                    <a href="https://thiepmoicuoionl.github.io/mau_02/" target="_blank" class="btn-view-demo">Xem
                        Mẫu</a>
                </div>
            </article>

            <!-- THẺ SỐ 03 -->
            <article class="template-card">
                <div class="card-image-wrap">
                    <img src="anh_mockup_3.png" alt="Mẫu thiệp 3">
                </div>
                <div class="card-info">
                    <span class="template-id">No. 03</span>
                    <h2 class="template-name">Mẫu Nâu Trắng</h2>
                    <a href="https://thiepmoicuoionl.github.io/mau_03/" target="_blank" class="btn-view-demo">Xem
                        Mẫu</a>
                </div>
            </article>

            <!-- THẺ SỐ 04 -->
            <article class="template-card">
                <div class="card-image-wrap">
                    <img src="anh_mockup_4.png" alt="Mẫu thiệp 4">
                </div>
                <div class="card-info">
                    <span class="template-id">No. 04</span>
                    <h2 class="template-name">Mẫu Xanh Rêu</h2>
                    <a href="https://thiepmoicuoionl.github.io/mau_04/" target="_blank" class="btn-view-demo">Xem
                        Mẫu</a>
                </div>
            </article>

        </div>

        <!-- BỘ ĐIỀU KHIỂN PHÂN TRANG (LUXURY PAGINATION) -->
        <div id="luxury-pagination" class="pagination-wrapper">
            <!-- JavaScript sẽ tự động sinh ra các nút 01, 02, 03 ở đây -->
        </div>

        <!-- =========================================
         LỒNG KÍNH VIỄN VỌNG (LIVE DEMO MODAL)
         ========================================= -->
        <div id="live-demo-modal" class="demo-modal-overlay">
            <!-- Nút Tắt -->
            <button class="demo-close-btn" aria-label="Đóng lại">&times;</button>

            <!-- Khung viền điện thoại -->
            <div class="demo-iframe-wrapper">
                <div class="demo-loader">Đang kết nối không gian...</div>
                <!-- Bức màn Iframe thần thánh -->
                <iframe id="demo-iframe" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const CARDS_PER_PAGE = 12; // LUẬT THÉP CỦA NGÀI: Chính xác 12 thẻ mỗi trang
            const collectionGrid = document.querySelector('.collection-grid');
            const cards = Array.from(collectionGrid.querySelectorAll('.template-card'));
            const paginationContainer = document.getElementById('luxury-pagination');

            let currentPage = 1;
            const totalPages = Math.ceil(cards.length / CARDS_PER_PAGE);

            // Hàm Đạo diễn Không gian: Hiển thị thẻ theo trang
            function renderPage(page) {
                currentPage = page;

                cards.forEach((card, index) => {
                    // Thuật toán cắt lát: Chỉ hiển thị thẻ thuộc về trang hiện tại
                    if (index >= (page - 1) * CARDS_PER_PAGE && index < page * CARDS_PER_PAGE) {
                        card.style.display = 'flex';

                        // Kích nổ lại hiệu ứng trượt lên (Reset Animation) để khách luôn thấy mượt mà
                        card.style.animation = 'none';
                        card.offsetHeight; /* Cú lừa vật lý ép trình duyệt load lại */
                        card.style.animation = null;
                    } else {
                        // Chém bỏ tàn nhẫn những thẻ không thuộc trang này
                        card.style.display = 'none';
                    }
                });

                renderPagination();
            }

            // Hàm kiến tạo các con số Tạp chí (01, 02, 03)
            function renderPagination() {
                paginationContainer.innerHTML = ''; // Xóa sạch để xây lại

                // NẾU CHƯA ĐỦ 13 THIỆP: GIẤU LUÔN PHÂN TRANG CHO SẠCH SẼ!
                if (totalPages <= 1) {
                    paginationContainer.style.display = 'none';
                    return;
                }

                paginationContainer.style.display = 'flex';

                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');

                    // Ép định dạng 01, 02 thay vì 1, 2 phèn chúa
                    const formattedNumber = i < 10 ? `0${i}` : i;

                    btn.className = `page-number ${i === currentPage ? 'active' : ''}`;
                    btn.innerText = formattedNumber;

                    btn.addEventListener('click', () => {
                        renderPage(i);
                        // Cuộn mượt mà lên đầu Lưới thiệp sau khi chuyển trang
                        const offsetTop = collectionGrid.getBoundingClientRect().top + window.scrollY - 100;
                        window.scrollTo({ top: offsetTop, behavior: 'smooth' });
                    });

                    paginationContainer.appendChild(btn);
                }
            }

            // KÍCH HOẠT HỆ THỐNG PHÂN MẢNH
            renderPage(1);
        });

        // =========================================
        // HỆ THỐNG ĐÁNH CHẶN & THAO TÚNG NÚT "BACK" (HISTORY API)
        // =========================================
        const modal = document.getElementById('live-demo-modal');
        const iframe = document.getElementById('demo-iframe');
        const closeBtn = document.querySelector('.demo-close-btn');

        // 1. MỞ LỒNG KÍNH & BƠM TRẠNG THÁI ẢO VÀO TRÌNH DUYỆT
        document.body.addEventListener('click', function (e) {
            const btn = e.target.closest('.btn-view-demo');
            if (!btn) return;

            e.preventDefault();
            const targetUrl = btn.getAttribute('href');

            if (targetUrl && targetUrl !== '#') {
                // Đưa link vào lồng kính và hiển thị
                iframe.src = targetUrl;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; // Khóa cuộn trang chủ

                // 🔥 LỆNH BÀI THAO TÚNG: Cấy một trạng thái "ảo" (#view-demo) vào Lịch sử trình duyệt
                history.pushState({ modalOpen: true }, "", "#view-demo");
            }
        });

        // 2. HÀM TIÊU HỦY LỒNG KÍNH (CHỈ XỬ LÝ GIAO DIỆN)
        function closeModalUI() {
            modal.classList.remove('active');
            document.body.style.overflow = ''; // Mở khóa cuộn trang chủ

            // Đợi lồng kính mờ hẳn rồi mới xóa nguồn Iframe (Cắt tiếng nhạc êm ái)
            setTimeout(() => { iframe.src = ''; }, 600);
        }

        // 3. 🔥 ĐÁNH CHẶN NÚT "QUAY LẠI" (BACK BUTTON/SWIPE) CỦA ĐIỆN THOẠI
        window.addEventListener('popstate', function (e) {
            // Khi khách vuốt Back, thẻ "#view-demo" bị trình duyệt rút lại.
            // Ta kiểm tra, nếu lồng kính đang mở -> Tiêu hủy nó ngay lập tức!
            if (modal.classList.contains('active')) {
                closeModalUI();
            }
        });

        // 4. KHI KHÁCH CỐ TÌNH BẤM NÚT "X" HOẶC CHẠM RA NGOÀI LỒNG KÍNH
        function handleManualClose() {
            // Thay vì đóng UI thô bạo, ta bắt trình duyệt "Lùi lại 1 bước"
            // Điều này sẽ tự động kích hoạt sự kiện "popstate" ở trên, giữ lịch sử cực sạch!
            if (window.location.hash === '#view-demo') {
                history.back();
            } else {
                closeModalUI(); // Cứu cánh phòng hờ
            }
        }

        // Kết nối các nút bấm vào hàm đóng tiêu chuẩn
        closeBtn.addEventListener('click', handleManualClose);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) handleManualClose();
        });
    </script>

</body>

</html>
